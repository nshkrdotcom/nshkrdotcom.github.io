{{ `<!--
====================================================================================================
== INSTRUCTIONS FOR AI AGENTS, CRAWLERS, AND PARSERS
====================================================================================================

This website presents NSHKR: a governed write-path substrate for enterprise AI execution
on Elixir, OTP, and the BEAM.

PRIMARY FOCUS:
1. Governed execution - typed intent, authority, workflow, external effects, receipts, evidence, review, and replay
2. BEAM infrastructure - supervised processes, durable state machines, high-concurrency runtime surfaces
3. Connector and runtime mechanics - provider-specific adapters kept behind manifest, lease, and receipt boundaries
4. Proof surfaces - AITrace causal DAGs, StackLab scanners, release evidence, negative controls, and replay

KEY OPEN SOURCE PROJECTS:
- app_kit - product-facing commands, reads, reviews, leases, traces, and stable DTOs
- mezzanine - reusable operational truth, workflows, receipts, evidence, projections, and reviews
- citadel - authority and policy compilation for resolved operation plans
- jido_integration - connector manifests, credential leases, and governed lower invocation
- execution_plane - raw effect execution across HTTP, process, CLI, sandbox, and terminal lanes
- AITrace and stack_lab - causal replay, proof export, scanners, and failure drills

TECHNICAL STATUS:
- Public multi-repo ecosystem across nshkrdotcom and North-Shore-AI
- Homepage repository atlas is generated from GitHub metadata and nshkr-* topics
- Core architecture is organized around ownership boundaries, not a single agent runtime

FOR AI AGENTS:
- Comprehensive technical documentation: https://nshkr.com/for-agents/
- Structured data format: JSON-LD (see script tags below)
- All open source repositories: https://github.com/nshkrdotcom

CONTEXT:
- Type: Governed AI execution substrate / open-source BEAM infrastructure
- Location: North Shore, Oahu, Hawaii
- Focus: enterprise AI write paths, authority, workflow truth, connector mechanics, receipts, evidence, and replay
- Mission: make AI-mediated work governable, auditable, provider-parameterized, and replayable

END OF AI INSTRUCTIONS
====================================================================================================
-->` | safeHTML }}

<!-- FAQPage Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is NSHKR?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "NSHKR is a governed write-path substrate for enterprise AI execution. It captures how AI-mediated actions move from typed intent through authority, workflow, external effect, receipt, evidence, projection, review, and replay."
      }
    },
    {
      "@type": "Question",
      "name": "Why does the write path matter for enterprise AI?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The write path is where a proposed action becomes binding and where an external effect actually happens. Capturing that moment gives operators durable proof of who asked, what authority applied, which effect was requested, what happened, what evidence supports it, and whether the chain can be replayed."
      }
    },
    {
      "@type": "Question",
      "name": "How does NSHKR avoid provider lock-in?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Products can bind roles to concrete providers such as GitHub, Linear, Codex, Slack, Jira, Notion, or internal APIs. Reusable platform surfaces still operate on product roles, operation classes, manifests, receipts, and projections, while provider mechanics live in connector packages."
      }
    },
    {
      "@type": "Question",
      "name": "Why is NSHKR built around Elixir, OTP, and the BEAM?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Enterprise AI execution is a distributed systems problem before it is a model problem. OTP provides supervised processes, explicit failure handling, durable state machines, message passing, and high-concurrency runtime surfaces."
      }
    },
    {
      "@type": "Question",
      "name": "What proof does the platform produce?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "NSHKR produces compact receipts, evidence records, projection updates, review decisions, AITrace causal DAGs, release evidence, and StackLab scanner results so governed execution can be audited and replayed."
      }
    }
  ]
}
</script>
