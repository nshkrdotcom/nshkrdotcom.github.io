<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">GroundPlane logo</title>
  <desc id="desc">A symmetric hexagonal infrastructure emblem with layered grid geometry and a grounded core.</desc>
  <defs>
    <linearGradient id="gpShell" x1="30" y1="24" x2="170" y2="176" gradientUnits="userSpaceOnUse">
