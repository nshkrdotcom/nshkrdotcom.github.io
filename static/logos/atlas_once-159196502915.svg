<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: warm parchment to pale sage -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#E2EBD8"/>
    </linearGradient>

    <!-- Globe fill: deep teal -->
    <linearGradient id="globeGrad" x1="140" y1="100" x2="400" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14807A"/>
      <stop offset="100%" stop-color="#0D5752"/>
    </linearGradient>

    <!-- Accent: burnt orange -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>

    <!-- Button: teal -->
    <linearGradient id="btnTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A7A72"/>
      <stop offset="100%" stop-color="#0F5E58"/>
    </linearGradient>

    <!-- Button: orange -->
    <linearGradient id="btnOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D9500E"/>
      <stop offset="100%" stop-color="#B83A08"/>
    </linearGradient>

    <!-- Drop shadow for globe -->
    <filter id="globeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0A3330" flood-opacity="0.22"/>
    </filter>

    <!-- Subtle card shadow -->
    <filter id="cardShadow" x="-4%" y="-6%" width="108%" height="118%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2A3D38" flood-opacity="0.10"/>
    </filter>

    <!-- Clip path to confine globe graphics inside the filled circle -->
    <clipPath id="globeClip">
      <circle cx="268" cy="240" r="148"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════
       BACKGROUND CARD
  ════════════════════════════════════════════════════════════ -->
  <rect x="20" y="20" width="1160" height="440" rx="32" fill="url(#bgGrad)"/>

  <!-- Subtle top-edge horizon lines for texture -->
  <path d="M 60 115 Q 300 76 600 92 Q 880 108 1140 80" stroke="#C8D4C2" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 60 380 Q 340 420 620 405 Q 880 390 1140 410" stroke="#C8D4C2" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- ═══════════════════════════════════════════════════════════
       GLOBE (left panel)
  ════════════════════════════════════════════════════════════ -->
  <!-- Shadow layer (rendered before the fill) -->
  <circle cx="268" cy="240" r="148" fill="url(#globeGrad)" filter="url(#globeShadow)"/>

  <!-- Globe fill -->
  <circle cx="268" cy="240" r="148" fill="url(#globeGrad)"/>

  <!-- Globe grid lines — clipped to the filled circle -->
  <g clip-path="url(#globeClip)" opacity="0.80">
    <!-- Equator -->
    <line x1="120" y1="240" x2="416" y2="240" stroke="#A7F3D0" stroke-width="2" stroke-linecap="round"/>
    <!-- Prime meridian -->
    <line x1="268" y1="92" x2="268" y2="388" stroke="#A7F3D0" stroke-width="2" stroke-linecap="round"/>
    <!-- Latitude parallels -->
    <ellipse cx="268" cy="240" rx="148" ry="50" stroke="#A7F3D0" stroke-width="1.5" fill="none"/>
    <ellipse cx="268" cy="240" rx="148" ry="110" stroke="#A7F3D0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Longitude ellipses -->
    <ellipse cx="268" cy="240" rx="55" ry="148" stroke="#A7F3D0" stroke-width="1.5" fill="none"/>
    <ellipse cx="268" cy="240" rx="110" ry="148" stroke="#A7F3D0" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Globe outer ring -->
  <circle cx="268" cy="240" r="148" stroke="#1A6E68" stroke-width="3" fill="none"/>

  <!-- Route path across the globe -->
  <g clip-path="url(#globeClip)">
    <path d="M 188 158 C 210 182 224 210 240 230 C 256 248 272 258 300 268 C 322 276 344 296 358 328"
          stroke="#FEF3C7" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Waypoint dots -->
    <circle cx="188" cy="158" r="9" fill="url(#accentGrad)"/>
    <circle cx="268" cy="248" r="9" fill="url(#accentGrad)"/>
    <circle cx="358" cy="328" r="9" fill="url(#accentGrad)"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       TEXT + CARD PANEL (right panel)
  ════════════════════════════════════════════════════════════ -->
  <!-- Card -->
  <rect x="472" y="68" width="688" height="344" rx="24" fill="#FFFCF5" stroke="#D4DACB" stroke-width="1.5"
        filter="url(#cardShadow)"/>

  <!-- Title -->
  <text x="516" y="146"
        fill="#14302C"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="64"
        font-weight="700"
        letter-spacing="-1">Atlas Once</text>

  <!-- Subtitle — split across two lines so it never overflows the card -->
  <text x="516" y="186"
        fill="#455E58"
        font-family="'Trebuchet MS', Verdana, sans-serif"
        font-size="21"
        font-weight="400">filesystem-first memory, registry &amp; context graph tooling</text>

  <!-- Divider -->
  <line x1="516" y1="208" x2="1124" y2="208" stroke="#D4DACB" stroke-width="1.5"/>

  <!-- Skeleton "content lines" suggesting body text -->
  <rect x="516" y="226" width="300" height="11" rx="5.5" fill="#164E63" opacity="0.10"/>
  <rect x="516" y="248" width="540" height="10" rx="5" fill="#164E63" opacity="0.08"/>
  <rect x="516" y="270" width="500" height="10" rx="5" fill="#164E63" opacity="0.08"/>
  <rect x="516" y="292" width="420" height="10" rx="5" fill="#164E63" opacity="0.08"/>

  <!-- ── Buttons ── -->
  <!-- Button 1: atlas registry scan (teal) -->
  <rect x="516" y="338" width="192" height="44" rx="22" fill="url(#btnTeal)"/>
  <text x="612" y="366"
        fill="#F0FDF9"
        font-family="'Trebuchet MS', Verdana, sans-serif"
        font-size="17"
        font-weight="700"
        text-anchor="middle">atlas registry scan</text>

  <!-- Button 2: atlas review daily (orange) -->
  <rect x="724" y="338" width="196" height="44" rx="22" fill="url(#btnOrange)"/>
  <text x="822" y="366"
        fill="#FFF7ED"
        font-family="'Trebuchet MS', Verdana, sans-serif"
        font-size="17"
        font-weight="700"
        text-anchor="middle">atlas review daily</text>

  <!-- Button 3: ctx / mcc (ghost) -->
  <rect x="936" y="338" width="112" height="44" rx="22" fill="#E8EFE4" stroke="#B8C8B2" stroke-width="1.5"/>
  <text x="992" y="366"
        fill="#2E4E48"
        font-family="'Trebuchet MS', Verdana, sans-serif"
        font-size="17"
        font-weight="700"
        text-anchor="middle">ctx / mcc</text>
</svg>
