<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="200"
  height="200"
  viewBox="0 0 200 200"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">jido_hive</title>
  <desc id="desc">Hexagonal workflow coordinator for server-client worker execution — a living hive of collaborative agents.</desc>

  <defs>
    <!-- ═══════════════════════════════════════════════════════════════
         GEOMETRY REFERENCE
         ═══════════════════════════════════════════════════════════════
         Both hexagons are mathematically REGULAR (all sides equal,
         all interior angles 120°), pointy-top orientation.

         Outer hexagon: R = 97 (circumradius), center (100,100)
           Vertices at angles -90° + i×60° for i=0..5:
             (100.00,  3.00)  (183.98, 51.50)  (183.98,148.50)
             (100.00,197.00)  ( 16.02,148.50)  ( 16.02, 51.50)
           Side length = 97.00   Height = 194   Width = 167.96

         Inner hexagon: R = 72 (circumradius), center (100,100)
           Vertices:
             (100.00, 28.00)  (162.35, 64.00)  (162.35,136.00)
             (100.00,172.00)  ( 37.65,136.00)  ( 37.65, 64.00)
           Side length = 72.00   Height = 144   Width = 124.71

         Honeycomb cells: flat-top, circumradius s = 14
           col_step = 21.0   row_step = 24.25   offset = 12.12
           19 cells tessellated, centered at (100,100)
         ═══════════════════════════════════════════════════════════════ -->

    <!-- ═══════════ GRADIENTS ═══════════ -->

    <!-- Outer hexagon: deep amber-brown, like dark beeswax -->
    <linearGradient id="outerFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#3a2208"/>
      <stop offset="40%"  stop-color="#2d1a06"/>
      <stop offset="100%" stop-color="#1a0e03"/>
    </linearGradient>

    <!-- Outer hexagon stroke: rich amber -->
    <linearGradient id="outerStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0b429"/>
      <stop offset="50%"  stop-color="#de9a1f"/>
      <stop offset="100%" stop-color="#c4841d"/>
    </linearGradient>

    <!-- Inner hexagon stroke: warm gold with transparency -->
    <linearGradient id="innerStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffd166" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c4841d" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Empty cell fill: dark warm translucent -->
    <radialGradient id="cellFill" cx="50%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#3a2810" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a0e03" stop-opacity="0.3"/>
    </radialGradient>

    <!-- Cell wall stroke: subtle amber wireframe -->
    <linearGradient id="cellWall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#de9a1f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a06b14" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Honey fill: glowing golden liquid -->
    <radialGradient id="honeyBright" cx="45%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="#ffe58a" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#f5b731" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#c4780e" stop-opacity="0.72"/>
    </radialGradient>

    <!-- Medium honey: partially filled cells -->
    <radialGradient id="honeyMid" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#ffd166" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#e8a020" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#a06b14" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Dim honey: barely filled outer cells -->
    <radialGradient id="honeyDim" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#dba830" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7a5010" stop-opacity="0.35"/>
    </radialGradient>

    <!-- Center aura: warm radiance from the queen cell -->
    <radialGradient id="queenAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffe994" stop-opacity="0.4"/>
      <stop offset="60%"  stop-color="#de9a1f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#de9a1f" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient warmth across entire outer hex -->
    <radialGradient id="ambientWarm" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f0b429" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1a0e03" stop-opacity="0"/>
    </radialGradient>

    <!-- Wax sheen: subtle surface texture -->
    <linearGradient id="waxSheen" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%"   stop-color="#fff8e0" stop-opacity="0.06"/>
      <stop offset="50%"  stop-color="#fff8e0" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#fff8e0" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Highlight for cell tops -->
    <linearGradient id="cellHighlight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#ffe58a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffe58a" stop-opacity="0"/>
    </linearGradient>

    <!-- ═══════════ FILTERS ═══════════ -->

    <!-- Warm glow around outer hexagon -->
    <filter id="outerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1   0   0   0   0
                0   0.7 0   0   0
                0   0   0.2 0   0
                0   0   0   0.5 0" result="warmBlur"/>
      <feMerge>
        <feMergeNode in="warmBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft inner glow for honey cells -->
    <filter id="honeyGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle emboss for depth -->
    <filter id="cellDepth" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6" result="shadow"/>
      <feOffset in="shadow" dx="0" dy="0.5" result="shifted"/>
      <feMerge>
        <feMergeNode in="shifted"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ═══════════ CLIP PATH ═══════════ -->
    <clipPath id="innerClip">
      <polygon points="100,28 162.35,64 162.35,136 100,172 37.65,136 37.65,64"/>
    </clipPath>
  </defs>

  <!-- ═══════════ OUTER REGULAR HEXAGON ═══════════ -->
  <polygon
    points="100,3 183.98,51.5 183.98,148.5 100,197 16.02,148.5 16.02,51.5"
    fill="url(#outerFill)"
    stroke="url(#outerStroke)"
    stroke-width="2.5"
    stroke-linejoin="round"
    filter="url(#outerGlow)"
  />

  <!-- Ambient warmth wash -->
  <polygon
    points="100,3 183.98,51.5 183.98,148.5 100,197 16.02,148.5 16.02,51.5"
    fill="url(#ambientWarm)"
  />

  <!-- ═══════════ INNER HEXAGON — rear stroke ═══════════ -->
  <polygon
    points="100,28 162.35,64 162.35,136 100,172 37.65,136 37.65,64"
    fill="none"
    stroke="url(#innerStroke)"
    stroke-width="1.2"
    stroke-linejoin="round"
    opacity="0.5"
  />

  <!-- ═══════════ CLIPPED HONEYCOMB INTERIOR ═══════════ -->
  <g clip-path="url(#innerClip)">

    <!-- Background wax sheen -->
    <polygon
      points="100,28 162.35,64 162.35,136 100,172 37.65,136 37.65,64"
      fill="url(#waxSheen)"
    />

    <!-- ═══════════ HONEYCOMB CELLS ═══════════
         19 regular flat-top hexagons, s=14, perfectly tessellated.
         Sorted by distance from center.
         Cell vertices computed as (cx±14, cy), (cx±7, cy±12.12).
    -->
    <g filter="url(#cellDepth)">

      <!-- ——— RING 3: OUTERMOST CELLS (d≈48.5) — empty structural wax ——— -->
      <g fill="url(#cellFill)" stroke="url(#cellWall)" stroke-width="0.9" stroke-linejoin="round">
        <!-- cell 13: (100.0, 148.5) -->
        <polygon points="114.0,148.5 107.0,160.6 93.0,160.6 86.0,148.5 93.0,136.4 107.0,136.4"/>
        <!-- cell 14: (58.0, 75.8) -->
        <polygon points="72.0,75.8 65.0,87.9 51.0,87.9 44.0,75.8 51.0,63.6 65.0,63.6"/>
        <!-- cell 15: (58.0, 124.2) -->
        <polygon points="72.0,124.2 65.0,136.4 51.0,136.4 44.0,124.2 51.0,112.1 65.0,112.1"/>
        <!-- cell 16: (100.0, 51.5) -->
        <polygon points="114.0,51.5 107.0,63.6 93.0,63.6 86.0,51.5 93.0,39.4 107.0,39.4"/>
        <!-- cell 17: (142.0, 75.8) -->
        <polygon points="156.0,75.8 149.0,87.9 135.0,87.9 128.0,75.8 135.0,63.6 149.0,63.6"/>
        <!-- cell 18: (142.0, 124.2) -->
        <polygon points="156.0,124.2 149.0,136.4 135.0,136.4 128.0,124.2 135.0,112.1 149.0,112.1"/>
      </g>

      <!-- ——— RING 2: MIDDLE CELLS (d≈42) — dimly honey-filled ——— -->
      <g fill="url(#honeyDim)" stroke="url(#cellWall)" stroke-width="1" stroke-linejoin="round">
        <!-- cell 7: (58.0, 100.0) -->
        <polygon points="72.0,100.0 65.0,112.1 51.0,112.1 44.0,100.0 51.0,87.9 65.0,87.9"/>
        <!-- cell 8: (79.0, 63.6) -->
        <polygon points="93.0,63.6 86.0,75.8 72.0,75.8 65.0,63.6 72.0,51.5 86.0,51.5"/>
        <!-- cell 9: (79.0, 136.4) -->
        <polygon points="93.0,136.4 86.0,148.5 72.0,148.5 65.0,136.4 72.0,124.2 86.0,124.2"/>
        <!-- cell 10: (121.0, 63.6) -->
        <polygon points="135.0,63.6 128.0,75.8 114.0,75.8 107.0,63.6 114.0,51.5 128.0,51.5"/>
        <!-- cell 11: (121.0, 136.4) -->
        <polygon points="135.0,136.4 128.0,148.5 114.0,148.5 107.0,136.4 114.0,124.2 128.0,124.2"/>
        <!-- cell 12: (142.0, 100.0) -->
        <polygon points="156.0,100.0 149.0,112.1 135.0,112.1 128.0,100.0 135.0,87.9 149.0,87.9"/>
      </g>

      <!-- ——— RING 1: INNER CELLS (d≈24.2) — medium honey fill ——— -->
      <g fill="url(#honeyMid)" stroke="#de9a1f" stroke-width="1" stroke-linejoin="round" stroke-opacity="0.7">
        <!-- cell 1: (79.0, 87.9) -->
        <polygon points="93.0,87.9 86.0,100.0 72.0,100.0 65.0,87.9 72.0,75.8 86.0,75.8"/>
        <!-- cell 2: (100.0, 75.8) -->
        <polygon points="114.0,75.8 107.0,87.9 93.0,87.9 86.0,75.8 93.0,63.6 107.0,63.6"/>
        <!-- cell 3: (100.0, 124.2) -->
        <polygon points="114.0,124.2 107.0,136.4 93.0,136.4 86.0,124.2 93.0,112.1 107.0,112.1"/>
        <!-- cell 4: (121.0, 87.9) -->
        <polygon points="135.0,87.9 128.0,100.0 114.0,100.0 107.0,87.9 114.0,75.8 128.0,75.8"/>
        <!-- cell 5: (79.0, 112.1) -->
        <polygon points="93.0,112.1 86.0,124.2 72.0,124.2 65.0,112.1 72.0,100.0 86.0,100.0"/>
        <!-- cell 6: (121.0, 112.1) -->
        <polygon points="135.0,112.1 128.0,124.2 114.0,124.2 107.0,112.1 114.0,100.0 128.0,100.0"/>
      </g>

      <!-- ——— CENTER CELL (d=0) — the queen cell, brightest honey ——— -->
      <g filter="url(#honeyGlow)">
        <!-- cell 0: (100.0, 100.0) -->
        <polygon
          points="114.0,100.0 107.0,112.1 93.0,112.1 86.0,100.0 93.0,87.9 107.0,87.9"
          fill="url(#honeyBright)"
          stroke="#f0b429"
          stroke-width="1.3"
          stroke-linejoin="round"
        />
      </g>
    </g>

    <!-- ═══════════ CELL TOP HIGHLIGHTS ═══════════ -->
    <!-- Subtle top-edge catch-lights on select cells for 3D wax effect -->
    <g fill="none" stroke="#ffe58a" stroke-width="0.6" stroke-linecap="round" stroke-opacity="0.35">
      <!-- top edges of ring-1 cells (the two upper edges of flat-top hex) -->
      <!-- cell 0 top: from (93.0,87.9) → (107.0,87.9) → (114.0,100.0) but we want the top V -->
      <path d="M93,87.9 L107,87.9"/>
      <path d="M72,75.8 L86,75.8"/>
      <path d="M93,63.6 L107,63.6"/>
      <path d="M114,75.8 L128,75.8"/>
      <path d="M72,100 L86,100"/>
      <path d="M114,100 L128,100"/>
    </g>

    <!-- ═══════════ CONNECTION THREADS ═══════════ -->
    <!-- Subtle radial communication lines from center to ring-2 cell centers -->
    <g fill="none" stroke="#f0b429" stroke-opacity="0.15" stroke-width="0.7" stroke-linecap="round" stroke-dasharray="3,4">
      <line x1="100" y1="100" x2="58" y2="100"/>
      <line x1="100" y1="100" x2="79" y2="63.6"/>
      <line x1="100" y1="100" x2="121" y2="63.6"/>
      <line x1="100" y1="100" x2="142" y2="100"/>
      <line x1="100" y1="100" x2="121" y2="136.4"/>
      <line x1="100" y1="100" x2="79" y2="136.4"/>
    </g>

    <!-- ═══════════ CENTER AURA ═══════════ -->
    <circle cx="100" cy="100" r="35" fill="url(#queenAura)"/>

    <!-- ═══════════ DATA PARTICLES ═══════════ -->
    <!-- Tiny glowing dots at cell centers — representing active agents/data -->
    <g fill="#ffe58a">
      <!-- Center: queen agent -->
      <circle cx="100" cy="100" r="3" opacity="0.9"/>
      <!-- Ring 1: worker agents -->
      <circle cx="79"  cy="87.9"  r="1.8" opacity="0.7"/>
      <circle cx="100" cy="75.8"  r="1.8" opacity="0.65"/>
      <circle cx="121" cy="87.9"  r="1.8" opacity="0.7"/>
      <circle cx="121" cy="112.1" r="1.8" opacity="0.65"/>
      <circle cx="100" cy="124.2" r="1.8" opacity="0.65"/>
      <circle cx="79"  cy="112.1" r="1.8" opacity="0.7"/>
      <!-- Ring 2: scout agents (smaller) -->
      <circle cx="58"  cy="100"   r="1.2" opacity="0.45"/>
      <circle cx="79"  cy="63.6"  r="1.2" opacity="0.4"/>
      <circle cx="121" cy="63.6"  r="1.2" opacity="0.4"/>
      <circle cx="142" cy="100"   r="1.2" opacity="0.45"/>
      <circle cx="121" cy="136.4" r="1.2" opacity="0.4"/>
      <circle cx="79"  cy="136.4" r="1.2" opacity="0.4"/>
    </g>

    <!-- ═══════════ PULSING RING (center cell emphasis) ═══════════ -->
    <circle cx="100" cy="100" r="16"
      fill="none" stroke="#ffe58a" stroke-width="0.8" stroke-opacity="0.2"/>

  </g>

  <!-- ═══════════ INNER HEXAGON — final crisp stroke ═══════════ -->
  <polygon
    points="100,28 162.35,64 162.35,136 100,172 37.65,136 37.65,64"
    fill="none"
    stroke="url(#innerStroke)"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- ═══════════ OUTER HEXAGON — final crisp stroke ═══════════ -->
  <polygon
    points="100,3 183.98,51.5 183.98,148.5 100,197 16.02,148.5 16.02,51.5"
    fill="none"
    stroke="url(#outerStroke)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- ═══════════ VERTEX HIGHLIGHTS ═══════════ -->
  <!-- Small amber dots at outer hex vertices for polish -->
  <g fill="#f0b429" opacity="0.6">
    <circle cx="100"    cy="3"     r="2.2"/>
    <circle cx="183.98" cy="51.5"  r="2.2"/>
    <circle cx="183.98" cy="148.5" r="2.2"/>
    <circle cx="100"    cy="197"   r="2.2"/>
    <circle cx="16.02"  cy="148.5" r="2.2"/>
    <circle cx="16.02"  cy="51.5"  r="2.2"/>
  </g>

</svg>
