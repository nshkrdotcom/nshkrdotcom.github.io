<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4e342e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#212121;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e24aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949ab;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Hexagon Outer -->
  <polygon points="177.942,145 100,190 22.058,145 22.058,55 100,10 177.942,55" 
           fill="url(#hexGrad)" 
           stroke="#a1887f" 
           stroke-width="2" 
           filter="url(#shadow)" />
  
  <!-- Detailed Inner Shape (Graph-like intelligence node) -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="url(#innerGrad)" stroke-width="1.5" stroke-dasharray="10 5" />
  <circle cx="100" cy="100" r="25" fill="url(#innerGrad)" opacity="0.8" />
  
  <!-- Connection Lines (Advanced Styling) -->
  <line x1="100" y1="100" x2="100" y2="35" stroke="#ce93d8" stroke-width="1.5" stroke-linecap="round" />
  <line x1="100" y1="100" x2="155" y2="132" stroke="#ce93d8" stroke-width="1.5" stroke-linecap="round" />
  <line x1="100" y1="100" x2="45" y2="132" stroke="#ce93d8" stroke-width="1.5" stroke-linecap="round" />
  
  <circle cx="100" cy="35" r="5" fill="#e1bee7" />
  <circle cx="155" cy="132" r="5" fill="#e1bee7" />
  <circle cx="45" cy="132" r="5" fill="#e1bee7" />
  
  <!-- Subtle Pulse Glow -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#ba68c8" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
