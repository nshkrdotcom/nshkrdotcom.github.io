<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">Exdantic Hexagonal Mark</title>
  <desc id="desc">A layered hexagonal emblem with precision facets and an interlaced geometric core.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="24" y1="18" x2="176" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#07101d"/>
    </linearGradient>

    <linearGradient id="outerStroke" x1="20" y1="54" x2="180" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.45" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>

    <linearGradient id="innerStroke" x1="33" y1="62" x2="167" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#93c5fd" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.85"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="100" cy="100" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="0.55" stop-color="#38bdf8" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="facetA" x1="100" y1="23" x2="167" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="facetB" x1="33" y1="100" x2="100" y2="177" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.04"/>
    </linearGradient>

    <linearGradient id="facetC" x1="20" y1="54" x2="180" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a5b4fc" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="loopA" x1="-32" y1="0" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>

    <linearGradient id="loopB" x1="-32" y1="-16" x2="32" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>

    <linearGradient id="loopC" x1="-32" y1="16" x2="32" y2="-16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>

    <radialGradient id="nucleus" cx="0" cy="0" r="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="0.35" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#0284c7"/>
    </radialGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#020617" flood-opacity="0.5"/>
    </filter>

    <filter id="coreBloom" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.35" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="innerHexClip">
      <polygon points="100,23 167,62 167,138 100,177 33,138 33,62"/>
    </clipPath>

    <path id="orbitalLoop" d="M -30 0 C -30 -14 -16 -26 0 -26 C 16 -26 30 -14 30 0 C 30 14 16 26 0 26 C -16 26 -30 14 -30 0 Z"/>
  </defs>

  <g filter="url(#dropShadow)">
    <polygon points="100,8 180,54 180,146 100,192 20,146 20,54" fill="url(#bgGradient)"/>
    <polygon points="100,8 180,54 180,146 100,192 20,146 20,54" fill="url(#coreGlow)"/>
  </g>

  <g clip-path="url(#innerHexClip)">
    <polygon points="100,100 100,23 167,62" fill="url(#facetA)"/>
    <polygon points="100,100 167,62 167,138" fill="url(#facetC)"/>
    <polygon points="100,100 167,138 100,177" fill="url(#facetB)"/>
    <polygon points="100,100 100,177 33,138" fill="url(#facetA)"/>
    <polygon points="100,100 33,138 33,62" fill="url(#facetC)"/>
    <polygon points="100,100 33,62 100,23" fill="url(#facetB)"/>

    <path d="M33 62 L167 138 M167 62 L33 138 M100 23 L100 177" stroke="#67e8f9" stroke-opacity="0.15" stroke-width="1.2"/>
    <circle cx="100" cy="100" r="58" fill="none" stroke="#7dd3fc" stroke-opacity="0.18" stroke-width="1"/>
    <circle cx="100" cy="100" r="40" fill="none" stroke="#67e8f9" stroke-opacity="0.2" stroke-width="0.9"/>
  </g>

  <polygon points="100,8 180,54 180,146 100,192 20,146 20,54" fill="none" stroke="url(#outerStroke)" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="100,23 167,62 167,138 100,177 33,138 33,62" fill="none" stroke="url(#innerStroke)" stroke-width="1.8" stroke-linejoin="round" opacity="0.9"/>

  <g transform="translate(100 100)" filter="url(#coreBloom)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <use href="#orbitalLoop" stroke="url(#loopA)" stroke-width="6.2" opacity="0.9"/>
      <use href="#orbitalLoop" transform="rotate(60)" stroke="url(#loopB)" stroke-width="6.2" opacity="0.9"/>
      <use href="#orbitalLoop" transform="rotate(120)" stroke="url(#loopC)" stroke-width="6.2" opacity="0.9"/>

      <use href="#orbitalLoop" stroke="#e0f2fe" stroke-width="1.1" opacity="0.55"/>
      <use href="#orbitalLoop" transform="rotate(60)" stroke="#cffafe" stroke-width="1.1" opacity="0.5"/>
      <use href="#orbitalLoop" transform="rotate(120)" stroke="#dcfce7" stroke-width="1.1" opacity="0.45"/>
    </g>

    <path d="M0 -19 L6 -6 L19 0 L6 6 L0 19 L-6 6 L-19 0 L-6 -6 Z" fill="url(#nucleus)" stroke="#dbeafe" stroke-opacity="0.7" stroke-width="1"/>

    <g stroke="#bae6fd" stroke-opacity="0.55" stroke-width="1.1">
      <line x1="0" y1="-32" x2="0" y2="-19"/>
      <line x1="28" y1="-16" x2="16" y2="-9"/>
      <line x1="28" y1="16" x2="16" y2="9"/>
      <line x1="0" y1="32" x2="0" y2="19"/>
      <line x1="-28" y1="16" x2="-16" y2="9"/>
      <line x1="-28" y1="-16" x2="-16" y2="-9"/>
    </g>

    <g fill="#f0f9ff" fill-opacity="0.9" stroke="#67e8f9" stroke-width="0.8">
      <circle cx="0" cy="-32" r="2.6"/>
      <circle cx="28" cy="-16" r="2.6"/>
      <circle cx="28" cy="16" r="2.6"/>
      <circle cx="0" cy="32" r="2.6"/>
      <circle cx="-28" cy="16" r="2.6"/>
      <circle cx="-28" cy="-16" r="2.6"/>
    </g>
  </g>
</svg>
