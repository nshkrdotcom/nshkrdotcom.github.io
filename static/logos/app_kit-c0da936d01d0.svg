<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">AppKit logo</title>
  <desc id="desc">A symmetric hexagonal interface emblem with layered panels, routing lines, and a centered application core.</desc>
  <defs>
    <linearGradient id="akShell" x1="31" y1="24" x2="169" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD36E"/>
      <stop offset="0.5" stop-color="#FF8E5E"/>
      <stop offset="1" stop-color="#FF4FA0"/>
    </linearGradient>
    <linearGradient id="akTrace" x1="55" y1="46" x2="145" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF5DC"/>
      <stop offset="1" stop-color="#FFD7EC"/>
    </linearGradient>
    <radialGradient id="akAura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(100 100) rotate(90) scale(74)">
      <stop offset="0" stop-color="#FFB287" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#FFB287" stop-opacity="0"/>
    </radialGradient>
    <filter id="akShadow" x="13" y="12" width="174" height="178" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="11" stdDeviation="11" flood-color="#1A1014" flood-opacity="0.24"/>
    </filter>
    <filter id="akBloom" x="41" y="39" width="118" height="122" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4.4" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

