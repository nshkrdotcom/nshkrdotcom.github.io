    <path d="M124.25 88H140.13" stroke="#FFB287" stroke-opacity="0.82" stroke-width="1.7"/>
    <rect x="90.8" y="78.8" width="18.4" height="18.4" rx="4.2" fill="#281820" stroke="#FFF5DC" stroke-width="2"/>
