    <path d="M100 24L155.42 56V120L100 152L44.58 120V56L100 24Z" fill="#171116" fill-opacity="0.94" stroke="url(#akShell)" stroke-width="4.6" stroke-linejoin="round"/>
    <path d="M100 42L140.13 65V111L100 134L59.87 111V65L100 42Z" fill="#21161B" stroke="url(#akTrace)" stroke-width="3.3" stroke-linejoin="round"/>
    <path d="M100 58L124.25 72V100L100 114L75.75 100V72L100 58Z" fill="#1C1319" stroke="#FFF0DB" stroke-opacity="0.74" stroke-width="2.1" stroke-linejoin="round"/>
  </g>

