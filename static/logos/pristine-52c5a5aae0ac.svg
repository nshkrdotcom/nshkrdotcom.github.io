    </linearGradient>
    <linearGradient id="rightFacet" x1="173" y1="52" x2="136" y2="123" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dffcff" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#65c8ff" stop-opacity="0.1"/>
