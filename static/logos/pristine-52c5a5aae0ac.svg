  <polygon points="100 28 156 60 156 132 100 164 44 132 44 60" fill="none" stroke="#71d3ff" stroke-opacity="0.12" stroke-width="1.2" stroke-linejoin="round"/>

  <g clip-path="url(#innerHexClip)">
    <g stroke="#9ddfff" stroke-opacity="0.08" stroke-width="1">
      <line x1="100" y1="28" x2="100" y2="92"/>
      <line x1="156" y1="60" x2="100" y2="92"/>
      <line x1="156" y1="132" x2="100" y2="92"/>
      <line x1="100" y1="164" x2="100" y2="92"/>
      <line x1="44" y1="132" x2="100" y2="92"/>
      <line x1="44" y1="60" x2="100" y2="92"/>
    </g>
    <path d="M44 60L100 92L156 60" stroke="#efffff" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M44 132L100 92L156 132" stroke="#7fd1ff" stroke-opacity="0.07" stroke-width="1"/>
  </g>

  <g filter="url(#bloom)">
    <circle cx="100" cy="101" r="28" fill="url(#coreGlow)"/>
  </g>

  <polygon points="100 56 128 73 128 127 100 144 72 127 72 73" fill="none" stroke="url(#haloStroke)" stroke-width="1.2" stroke-opacity="0.56" stroke-linejoin="round"/>

  <g clip-path="url(#coreClip)">
    <rect x="70" y="50" width="60" height="92" fill="#f8ffff" fill-opacity="0.42" mask="url(#sheenMask)"/>
    <polygon points="86 66 100 60 114 66 100 78" fill="url(#gemTable)"/>
    <polygon points="82 72 86 66 100 78 88 91 74 89" fill="url(#gemLeft)"/>
    <polygon points="114 66 118 72 126 89 112 91 100 78" fill="url(#gemRight)"/>
    <polygon points="88 91 100 78 112 91 100 103" fill="url(#gemCenter)"/>
    <polygon points="74 89 88 91 100 103 90 120 84 121" fill="url(#gemLeft)"/>
    <polygon points="100 103 112 91 126 89 116 121 110 120" fill="url(#gemRight)"/>
    <polygon points="90 120 100 103 100 140 84 121" fill="url(#gemBottom)"/>
    <polygon points="100 103 110 120 116 121 100 140" fill="url(#gemBottom)"/>
    <polygon points="90 66 100 62 110 66 100 74" fill="#ffffff" fill-opacity="0.72"/>
  </g>

  <g stroke="url(#gemEdge)" stroke-width="1.05" stroke-linejoin="round" stroke-linecap="round" stroke-opacity="0.9">
    <polygon points="100 58 118 72 126 89 116 121 100 140 84 121 74 89 82 72" fill="none"/>
    <line x1="92" y1="67" x2="108" y2="67" stroke-opacity="0.65"/>
    <line x1="74" y1="89" x2="126" y2="89"/>
    <line x1="100" y1="60" x2="100" y2="140"/>
    <line x1="88" y1="91" x2="100" y2="103"/>
    <line x1="112" y1="91" x2="100" y2="103"/>
    <line x1="90" y1="120" x2="100" y2="140"/>
    <line x1="110" y1="120" x2="100" y2="140"/>
  </g>

  <g fill="#defcff" fill-opacity="0.78">
    <circle cx="100" cy="32" r="2.1"/>
    <circle cx="151" cy="62" r="1.8"/>
    <circle cx="151" cy="128" r="1.8"/>
    <circle cx="100" cy="168" r="2.1"/>
    <circle cx="49" cy="128" r="1.8"/>
    <circle cx="49" cy="62" r="1.8"/>
  </g>
</svg>
