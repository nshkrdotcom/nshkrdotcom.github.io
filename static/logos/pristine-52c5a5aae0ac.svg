<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pristine</title>
  <desc id="desc">Faceted hexagonal crystal emblem with a luminous diamond core, expressing precision, purity, and resilient structure.</desc>
  <defs>
    <linearGradient id="shellFill" x1="34" y1="18" x2="167" y2="183" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071522"/>
      <stop offset="0.36" stop-color="#13283c"/>
      <stop offset="0.7" stop-color="#0a1624"/>
      <stop offset="1" stop-color="#030b14"/>
    </linearGradient>
    <linearGradient id="shellStroke" x1="28" y1="32" x2="171" y2="166" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6ffff"/>
      <stop offset="0.2" stop-color="#a7ebff"/>
      <stop offset="0.55" stop-color="#58c4ff"/>
      <stop offset="1" stop-color="#123f63"/>
    </linearGradient>
    <radialGradient id="ambient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(96 52) rotate(87.4552) scale(130.139 120.796)">
