    <clipPath id="coreClip">
      <polygon points="100 58 118 72 126 89 116 121 100 140 84 121 74 89 82 72"/>
    </clipPath>
    <mask id="sheenMask" maskUnits="userSpaceOnUse">
      <rect x="68" y="48" width="64" height="96" fill="#000000"/>
      <rect x="90" y="46" width="16" height="110" rx="8" fill="url(#sheenBand)" transform="rotate(-24 100 100)"/>
    </mask>
