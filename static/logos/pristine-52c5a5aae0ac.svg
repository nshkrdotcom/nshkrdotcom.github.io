      <stop offset="0.62" stop-color="#59c5ff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0d4f7f" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="causticSweep" x1="45" y1="42" x2="154" y2="156" gradientUnits="userSpaceOnUse">
