      <stop offset="0.52" stop-color="#b6fbff" stop-opacity="0.12"/>
      <stop offset="0.75" stop-color="#66caff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#66caff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(100 101) rotate(90) scale(34)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="0.36" stop-color="#d7fbff" stop-opacity="0.4"/>
      <stop offset="0.72" stop-color="#76dcff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#76dcff" stop-opacity="0"/>
