    <circle cx="94" cy="57" r="58" fill="url(#upperGlow)"/>
    <polygon points="100 9 175 48 166 54 100 17 34 54 25 48" fill="url(#topFacet)"/>
    <polygon points="25 48 34 54 34 137 25 143 49 102 49 63" fill="url(#leftFacet)"/>
    <polygon points="175 48 166 54 166 137 175 143 151 102 151 63" fill="url(#rightFacet)"/>
    <polygon points="34 137 100 175 166 137 175 143 100 185 25 143" fill="url(#lowerFacet)"/>
    <polygon points="46 42 158 51 164 103 96 176 34 126" fill="url(#causticSweep)"/>
    <polygon points="63 36 144 50 139 121 67 151 48 88" fill="#9aebff" fill-opacity="0.03"/>
    <rect x="18" y="18" width="164" height="164" fill="#e8fbff" fill-opacity="0.05" filter="url(#grain)"/>
