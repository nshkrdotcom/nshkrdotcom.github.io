      <stop offset="1" stop-color="#030911"/>
    </radialGradient>
    <radialGradient id="upperGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(94 57) rotate(90) scale(58)">
      <stop offset="0" stop-color="#91fcff" stop-opacity="0.72"/>
      <stop offset="0.32" stop-color="#46d2ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#46d2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topFacet" x1="100" y1="10" x2="100" y2="56" gradientUnits="userSpaceOnUse">
