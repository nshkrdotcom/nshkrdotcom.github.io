      <stop offset="0.55" stop-color="#9ceaff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7dcfff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leftFacet" x1="26" y1="54" x2="64" y2="117" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86e8ff" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#4ba3df" stop-opacity="0.08"/>
