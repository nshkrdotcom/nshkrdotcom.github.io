<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Hexagon fill gradient -->
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C2C2C"/>
      <stop offset="45%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>

    <!-- Hex border gradient -->
    <linearGradient id="hexBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#606060"/>
      <stop offset="50%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#606060"/>
    </linearGradient>

    <!-- Specular highlight on hex -->
    <radialGradient id="specular" cx="40%" cy="25%" r="60%" fx="40%" fy="25%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.03)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Page gradient -->
    <linearGradient id="pageFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>

    <!-- Accent bar gradient (Notion red-orange) -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EB5757"/>
      <stop offset="100%" stop-color="#E03E3E"/>
    </linearGradient>

    <!-- Checkbox checked gradient -->
    <linearGradient id="checkFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2EAADC"/>
      <stop offset="100%" stop-color="#2B95BF"/>
    </linearGradient>

    <!-- Tag gradient -->
    <linearGradient id="tagPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>

    <!-- Drop shadow for hex -->
    <filter id="hexShadow" x="-12%" y="-8%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="3" result="shifted"/>
      <feFlood flood-color="#000000" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for page -->
    <filter id="pageShadow" x="-15%" y="-10%" width="135%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feOffset dx="1" dy="2" result="shifted"/>
      <feFlood flood-color="#000000" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Emboss/bevel for hex surface -->
    <filter id="bevel" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.4" specularExponent="20" lighting-color="#ffffff" result="spec">
        <fePointLight x="80" y="40" z="180"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specIn"/>
      <feComposite in="SourceGraphic" in2="specIn" operator="arithmetic" k1="0" k2="1" k3="0.6" k4="0"/>
    </filter>

    <!-- Clip to hexagon -->
    <clipPath id="hexClip">
      <polygon points="100,4 183.14,52 183.14,148 100,196 16.86,148 16.86,52"/>
    </clipPath>

    <!-- Inner hex clip for specular -->
    <clipPath id="hexClipInner">
      <polygon points="100,10 178,55 178,145 100,190 22,145 22,55"/>
    </clipPath>

    <!-- Subtle noise texture -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- === HEXAGON CONTAINER === -->

  <!-- Main hexagon with shadow -->
  <polygon
    points="100,4 183.14,52 183.14,148 100,196 16.86,148 16.86,52"
    fill="url(#hexFill)"
    stroke="url(#hexBorder)"
    stroke-width="1.5"
    stroke-linejoin="round"
    filter="url(#hexShadow)"/>

  <!-- Bevel/emboss layer -->
  <polygon
    points="100,4 183.14,52 183.14,148 100,196 16.86,148 16.86,52"
    fill="url(#hexFill)"
    clip-path="url(#hexClip)"
    filter="url(#bevel)"
    opacity="0.5"/>

  <!-- Specular highlight -->
  <polygon
    points="100,4 183.14,52 183.14,148 100,196 16.86,148 16.86,52"
    fill="url(#specular)"
    clip-path="url(#hexClip)"/>

  <!-- Inner border line -->
  <polygon
    points="100,13 176,57 176,143 100,187 24,143 24,57"
    fill="none"
    stroke="rgba(255,255,255,0.05)"
    stroke-width="0.75"
    stroke-linejoin="round"/>

  <!-- Second inner border for depth -->
  <polygon
    points="100,16 174,59 174,141 100,184 26,141 26,59"
    fill="none"
    stroke="rgba(0,0,0,0.3)"
    stroke-width="0.5"
    stroke-linejoin="round"/>

  <!-- === NOTION PAGE ICON === -->
  <g filter="url(#pageShadow)" transform="translate(100, 98)">

    <!-- Page body -->
    <rect x="-30" y="-40" width="60" height="78" rx="3.5" ry="3.5"
          fill="url(#pageFill)"
          stroke="#C8C8C8" stroke-width="0.6"/>

    <!-- Dog-ear fold -->
    <path d="M 17,-40 L 30,-40 L 30,-27 Z" fill="#DADADA"/>
    <path d="M 17,-40 L 17,-27 L 30,-27 Z" fill="#ECECEC" stroke="#C0C0C0" stroke-width="0.4"/>
    <path d="M 17,-40 L 17,-27" stroke="#C0C0C0" stroke-width="0.5"/>
    <path d="M 17,-27 L 30,-27" stroke="#C0C0C0" stroke-width="0.5"/>

    <!-- Sidebar strip -->
    <rect x="-26" y="-34" width="3.5" height="66" rx="1.2" fill="#EBEBEB"/>

    <!-- === CONTENT BLOCKS === -->

    <!-- Title block (bold, dark) -->
    <rect x="-19" y="-33" width="28" height="4.5" rx="1" fill="#2D2D2D"/>

    <!-- Subtitle / date -->
    <rect x="-19" y="-26" width="18" height="2.5" rx="0.6" fill="#B0B0B0"/>

    <!-- Horizontal rule -->
    <line x1="-19" y1="-20" x2="24" y2="-20" stroke="#E0E0E0" stroke-width="0.8"/>

    <!-- Text paragraph lines -->
    <rect x="-19" y="-16" width="42" height="2" rx="0.5" fill="#999999"/>
    <rect x="-19" y="-12" width="36" height="2" rx="0.5" fill="#999999"/>
    <rect x="-19" y="-8" width="40" height="2" rx="0.5" fill="#999999"/>
    <rect x="-19" y="-4" width="24" height="2" rx="0.5" fill="#999999"/>

    <!-- Database table header -->
    <rect x="-19" y="2" width="42" height="4" rx="0.8" fill="url(#accent)" opacity="0.85"/>

    <!-- Table rows -->
    <g opacity="0.9">
      <rect x="-19" y="7.5" width="42" height="3.5" rx="0.4" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="0.3"/>
      <line x1="-3" y1="7.5" x2="-3" y2="11" stroke="#E0E0E0" stroke-width="0.3"/>
      <line x1="11" y1="7.5" x2="11" y2="11" stroke="#E0E0E0" stroke-width="0.3"/>

      <rect x="-19" y="12" width="42" height="3.5" rx="0.4" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="0.3"/>
      <line x1="-3" y1="12" x2="-3" y2="15.5" stroke="#E0E0E0" stroke-width="0.3"/>
      <line x1="11" y1="12" x2="11" y2="15.5" stroke="#E0E0E0" stroke-width="0.3"/>

      <rect x="-19" y="16.5" width="42" height="3.5" rx="0.4" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="0.3"/>
      <line x1="-3" y1="16.5" x2="-3" y2="20" stroke="#E0E0E0" stroke-width="0.3"/>
      <line x1="11" y1="16.5" x2="11" y2="20" stroke="#E0E0E0" stroke-width="0.3"/>
    </g>

    <!-- Checkbox items -->
    <g>
      <!-- Checked -->
      <rect x="-19" y="24" width="4" height="4" rx="1" fill="url(#checkFill)"/>
      <polyline points="-18,26.2 -17,27.5 -15.5,24.8" fill="none" stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="-13" y="24.8" width="20" height="2.2" rx="0.5" fill="#B8B8B8"/>
      <line x1="-13" y1="25.9" x2="5" y2="25.9" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>

      <!-- Unchecked -->
      <rect x="-19" y="30" width="4" height="4" rx="1" fill="none" stroke="#CCCCCC" stroke-width="0.7"/>
      <rect x="-13" y="30.8" width="24" height="2.2" rx="0.5" fill="#999999"/>
    </g>

    <!-- Tag/label pill -->
    <rect x="8" y="-26" width="14" height="3.5" rx="1.75" fill="url(#tagPurple)" opacity="0.75"/>

  </g>

  <!-- (diamond moved into page content) -->

  <!-- Subtle connecting dots pattern -->
  <g opacity="0.08" clip-path="url(#hexClip)">
    <circle cx="35" cy="45" r="1"/>
    <circle cx="55" cy="35" r="0.8"/>
    <circle cx="145" cy="40" r="0.8"/>
    <circle cx="165" cy="55" r="1"/>
    <circle cx="40" cy="165" r="0.8"/>
    <circle cx="160" cy="160" r="0.8"/>
    <line x1="35" y1="45" x2="55" y2="35" stroke="white" stroke-width="0.4"/>
    <line x1="145" y1="40" x2="165" y2="55" stroke="white" stroke-width="0.4"/>
  </g>
</svg>
