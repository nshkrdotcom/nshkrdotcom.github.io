<svg width="420" height="240" viewBox="0 0 420 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TrainingIR</title>
  <desc id="desc">Hexagonal mark for TrainingIR</desc>
  <defs>
    <linearGradient id="hex" x1="60" y1="40" x2="360" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B3B4F"/>
      <stop offset="1" stop-color="#1F7A8C"/>
    </linearGradient>
    <linearGradient id="shine" x1="120" y1="60" x2="300" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="420" height="240" fill="#F6F4EF"/>
  <polygon
    points="210 20 340 95 340 145 210 220 80 145 80 95"
    fill="url(#hex)"
  />
  <polygon
    points="210 36 326 101 326 139 210 204 94 139 94 101"
    fill="url(#shine)"
  />
  <text x="210" y="132" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#F6F4EF">
    TrainingIR
  </text>
</svg>
